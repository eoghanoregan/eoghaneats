<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eoghaneats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F2E8;
    --paper-2:#FFFFFF;
    --ink:#211C16;
    --ink-soft:#766C5E;
    --ink-faint:#A89C8A;
    --ember:#DD5B22;
    --ember-dark:#B6471A;
    --ember-soft:#F5DCC6;
    --line:#E8DFCD;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow-card: 0 1px 2px rgba(33,28,22,0.04), 0 8px 20px -12px rgba(33,28,22,0.18);
    --shadow-pop: 0 20px 50px -20px rgba(33,28,22,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:80px;
  }
  ::selection{ background:var(--ember-soft); }
  button{ font-family:inherit; cursor:pointer; }
  input{ font-family:inherit; }
  a{ color:inherit; }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 20px; }

  /* ---------- Header ---------- */
  .header{ padding:28px 0 18px; }
  .wordmark{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(2.4rem, 8vw, 3.6rem);
    line-height:1;
    color:var(--ember);
    letter-spacing:-0.01em;
    margin:0 0 6px -2px;
  }
  .tagline{ margin:0; color:var(--ink-soft); font-size:1rem; }

  /* ---------- Controls row ---------- */
  .controls{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .search-box{
    flex:1 1 240px;
    display:flex; align-items:center; gap:8px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0 16px;
    height:46px;
  }
  .search-box svg{ width:16px; height:16px; color:var(--ink-faint); flex:none; }
  .search-box input{
    border:none; outline:none; background:transparent; width:100%;
    font-size:0.95rem; color:var(--ink);
  }
  .search-box input::placeholder{ color:var(--ink-faint); font-family:'IBM Plex Mono',monospace; font-size:0.82rem; letter-spacing:.02em;}

  /* ---------- Tabs ---------- */
  .tabs{ display:flex; gap:8px; margin-top:18px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex:none; padding:9px 16px; border-radius:999px; border:1px solid var(--line);
    background:var(--paper-2); color:var(--ink-soft); font-size:0.86rem; font-weight:600;
    transition:all .12s ease;
  }
  .tab:hover{ border-color:var(--ember); color:var(--ember); }
  .tab.active{ background:var(--ink); border-color:var(--ink); color:#fff; }

  /* ---------- Section heading ---------- */
  .section-head{ display:flex; align-items:center; justify-content:space-between; margin:34px 0 14px; }
  .section-head h2{ font-size:1.1rem; font-weight:700; margin:0; }
  .arrow-btn{
    width:38px; height:38px; border-radius:10px; background:var(--ember-soft); color:var(--ember-dark);
    border:none; display:flex; align-items:center; justify-content:center; flex:none;
    transition:transform .12s ease, background .12s ease;
  }
  .arrow-btn:hover{ background:var(--ember); color:#fff; transform:translateX(2px); }
  .arrow-btn svg{ width:18px; height:18px; }

  /* ---------- Latest scroll row ---------- */
  .latest-row{
    display:flex; gap:16px; overflow-x:auto; padding-bottom:10px; margin:0 -20px; padding-left:20px; padding-right:20px;
    scroll-snap-type:x proximity;
  }
  .latest-row .card{ flex:none; width:220px; scroll-snap-align:start; }

  /* ---------- Grid ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:18px; }

  /* ---------- Card ---------- */
  .card{
    background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius-lg);
    overflow:hidden; cursor:pointer; text-align:left; padding:0; display:block; width:100%;
    box-shadow:var(--shadow-card);
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card:hover{ transform:translateY(-3px); border-color:var(--ember); }
  .card-img{
    width:100%; aspect-ratio:4/5; background:var(--ember-soft);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .card-img img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-img svg{ width:34px; height:34px; color:var(--ember-dark); opacity:.55; }
  .card-body{ padding:13px 15px 16px; }
  .card-title{ font-weight:700; font-size:1.02rem; margin:0 0 4px; line-height:1.25; }
  .card-tags{ color:var(--ink-soft); font-size:0.82rem; margin:0; }

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center; padding:60px 20px; border:1.5px dashed var(--line); border-radius:var(--radius-lg);
    margin-top:10px;
  }
  .empty svg{ width:46px; height:46px; color:var(--ink-faint); margin-bottom:14px; }
  .empty h3{ margin:0 0 6px; font-size:1.15rem; }
  .empty p{ margin:0; color:var(--ink-soft); font-size:0.94rem; }

  /* ---------- Overlay ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(33,28,22,0.5); backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
    opacity:0; pointer-events:none; transition:opacity .18s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  @media (min-width:720px){ .overlay{ align-items:center; padding:30px; } }
  .panel{
    background:var(--paper); width:100%; max-width:720px; max-height:92vh; overflow-y:auto;
    border-radius:22px 22px 0 0; box-shadow:var(--shadow-pop);
    transform:translateY(24px); transition:transform .2s ease;
    padding:22px 22px 32px;
  }
  .overlay.open .panel{ transform:translateY(0); }
  @media (min-width:720px){ .panel{ border-radius:22px; padding:28px; } }

  .close-x{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--paper-2);
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft); flex:none;
  }
  .close-x:hover{ color:var(--ember); border-color:var(--ember); }
  .close-x svg{ width:16px; height:16px; }

  /* ---------- Detail ---------- */
  .detail-photo{
    width:100%; aspect-ratio:4/5; border-radius:var(--radius-lg); overflow:hidden; background:var(--ember-soft);
    display:flex; align-items:center; justify-content:center; margin-bottom:20px;
  }
  .detail-photo img{ width:100%; height:100%; object-fit:cover; }
  .detail-photo svg{ width:48px; height:48px; color:var(--ember-dark); opacity:.5; }
  .detail-title{ font-size:1.6rem; font-weight:800; margin:0 0 8px; line-height:1.2; }
  .detail-desc{ color:var(--ink-soft); font-size:0.97rem; line-height:1.5; margin:0 0 14px; }
  .detail-meta{ display:flex; flex-wrap:wrap; gap:14px; margin-bottom:8px; }
  .detail-meta span{ font-family:'IBM Plex Mono',monospace; font-size:0.78rem; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); background:var(--paper-2); border:1px solid var(--line); padding:6px 11px; border-radius:999px; }
  .reel-link{ display:inline-flex; align-items:center; gap:6px; margin:14px 0 4px; color:var(--ember-dark); font-weight:700; font-size:0.9rem; text-decoration:none; }
  .reel-link svg{ width:14px; height:14px; }
  .detail-cols{ display:grid; grid-template-columns:1fr 1.3fr; gap:30px; margin-top:26px; }
  @media (max-width:600px){ .detail-cols{ grid-template-columns:1fr; gap:24px; } }
  .detail-cols h4{ font-size:0.8rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); margin:0 0 12px; }
  .ing-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px; }
  .ing-list li{ display:flex; align-items:flex-start; gap:10px; font-size:0.95rem; line-height:1.4; }
  .ing-dot{ width:7px; height:7px; border-radius:50%; background:var(--ember); margin-top:7px; flex:none; }
  .step-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:16px; }
  .step-list li{ display:flex; gap:13px; font-size:0.95rem; line-height:1.55; }
  .step-num{ font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--ember-dark); flex:none; width:22px; }
  .back-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .back-btn{ display:flex; align-items:center; gap:7px; color:var(--ink-soft); font-weight:600; font-size:0.9rem; background:none; border:none; padding:6px 2px; }
  .back-btn:hover{ color:var(--ember); }
  .back-btn svg{ width:16px; height:16px; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }
</style>
</head>
<body>

<div class="wrap">
  <header class="header">
    <h1 class="wordmark">@eoghaneats</h1>
    <p class="tagline">Recipes from the videos you love</p>

    <div class="controls">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="search recipes…" autocomplete="off">
      </div>
    </div>

    <div class="tabs" id="tabsRow"></div>
  </header>

  <section id="latestSection" style="display:none;">
    <div class="section-head">
      <h2>Latest recipes</h2>
      <button class="arrow-btn" id="latestArrowBtn" aria-label="See all recipes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="latest-row" id="latestRow"></div>
  </section>

  <section style="margin-top:34px;">
    <div class="section-head" id="gridHeading">
      <h2 id="gridHeadingText">All recipes</h2>
    </div>
    <div id="gridArea"></div>
  </section>
</div>

<div class="overlay" id="detailOverlay">
  <div class="panel" id="detailPanel"></div>
</div>

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }
  function safeUrl(u){
    if(!u) return '';
    u = u.trim();
    return /^https?:\/\//i.test(u) ? u : '';
  }

  var state = { category: 'All', search: '' };

  var ICON_POT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 11h16v3a6 6 0 0 1-6 6h-4a6 6 0 0 1-6-6v-3Z"/><path d="M2 11h20"/><path d="M8 11V7a1.5 1.5 0 0 1 3 0M16 11V7a1.5 1.5 0 0 0-3 0"/><circle cx="12" cy="4.2" r="1"/></svg>';
  var ICON_BOWL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h18a9 9 0 0 1-18 0Z"/><path d="M8 4c0 1.5 1.5 2 1.5 3.5S8 9.5 8 9.5"/><path d="M12 3c0 1.5 1.5 2 1.5 3.5S12 8.5 12 8.5"/><path d="M16 4c0 1.5 1.5 2 1.5 3.5S16 9.5 16 9.5"/></svg>';
  var ICON_EXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>';

  function categoriesInUse(){
    var set = [];
    RECIPES.forEach(function(r){ if(r.category && set.indexOf(r.category)===-1) set.push(r.category); });
    return set;
  }

  function renderTabs(){
    var cats = ['All'].concat(categoriesInUse());
    var row = document.getElementById('tabsRow');
    row.innerHTML = cats.map(function(c){
      return '<button class="tab'+(state.category===c?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>';
    }).join('');
    Array.prototype.forEach.call(row.querySelectorAll('.tab'), function(btn){
      btn.addEventListener('click', function(){
        state.category = btn.getAttribute('data-cat');
        renderTabs();
        renderGrid();
      });
    });
  }

  function filteredRecipes(){
    var q = state.search.trim().toLowerCase();
    return RECIPES.filter(function(r){
      var matchCat = state.category === 'All' || r.category === state.category;
      if(!matchCat) return false;
      if(!q) return true;
      var hay = (r.title+' '+r.description+' '+r.category+' '+(r.ingredients||[]).join(' ')).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
  }

  function cardHtml(r){
    var tagBits = [r.category];
    if(r.popular) tagBits.push('Popular');
    var img = r.image ? '<img src="'+r.image+'" alt="'+esc(r.title)+'" loading="lazy">' : ICON_POT;
    return (
      '<button class="card" data-id="'+esc(r.id)+'">'+
        '<div class="card-img">'+img+'</div>'+
        '<div class="card-body">'+
          '<p class="card-title">'+esc(r.title)+'</p>'+
          '<p class="card-tags">'+esc(tagBits.join(', '))+'</p>'+
        '</div>'+
      '</button>'
    );
  }

  function attachCardHandlers(container){
    Array.prototype.forEach.call(container.querySelectorAll('.card'), function(card){
      card.addEventListener('click', function(){ openDetail(card.getAttribute('data-id')); });
    });
  }

  function renderGrid(){
    var list = filteredRecipes();
    var gridArea = document.getElementById('gridArea');
    document.getElementById('gridHeadingText').textContent = state.category === 'All' ? 'All recipes' : state.category;

    if(RECIPES.length === 0){
      gridArea.innerHTML = (
        '<div class="empty">'+ ICON_BOWL +
          '<h3>Nothing on the menu yet</h3>'+
          '<p>New recipes go up here as soon as they\u2019re added \u2014 check back soon.</p>'+
        '</div>'
      );
      document.getElementById('latestSection').style.display = 'none';
      return;
    }

    if(list.length === 0){
      gridArea.innerHTML = '<div class="empty"><h3>No matches</h3><p>Try a different search term or category.</p></div>';
    } else {
      gridArea.innerHTML = '<div class="grid">' + list.map(cardHtml).join('') + '</div>';
      attachCardHandlers(gridArea);
    }

    var latestSection = document.getElementById('latestSection');
    if(state.category === 'All' && !state.search.trim() && RECIPES.length > 2){
      latestSection.style.display = '';
      var latestRow = document.getElementById('latestRow');
      latestRow.innerHTML = RECIPES.slice(0, 8).map(cardHtml).join('');
      attachCardHandlers(latestRow);
    } else {
      latestSection.style.display = 'none';
    }
  }

  document.getElementById('latestArrowBtn').addEventListener('click', function(){
    document.getElementById('gridHeading').scrollIntoView({behavior:'smooth', block:'start'});
  });

  function openOverlay(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
  function closeOverlay(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

  document.getElementById('detailOverlay').addEventListener('click', function(e){
    if(e.target.id === 'detailOverlay') closeOverlay('detailOverlay');
  });

  function openDetail(id){
    var r = RECIPES.find(function(x){ return x.id === id; });
    if(!r) return;
    var metaBits = [r.category];
    if(r.time) metaBits.push(r.time);
    if(r.servings) metaBits.push(r.servings);
    if(r.difficulty) metaBits.push(r.difficulty);

    var ingHtml = (r.ingredients||[]).map(function(i){
      return '<li><span class="ing-dot"></span>'+esc(i)+'</li>';
    }).join('') || '<li style="color:var(--ink-faint)">No ingredients listed.</li>';

    var stepHtml = (r.steps||[]).map(function(s,idx){
      return '<li><span class="step-num">'+(idx+1)+'.</span><span>'+esc(s)+'</span></li>';
    }).join('') || '<li style="color:var(--ink-faint)">No steps listed.</li>';

    var reel = safeUrl(r.igLink);

    document.getElementById('detailPanel').innerHTML = (
      '<div class="back-row">'+
        '<button class="back-btn" id="detailBackBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m15 18-6-6 6-6"/></svg> Back</button>'+
        '<button class="close-x" id="detailCloseBtn" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>'+
      '</div>'+
      '<div class="detail-photo">'+(r.image ? '<img src="'+r.image+'" alt="'+esc(r.title)+'">' : ICON_POT)+'</div>'+
      '<h2 class="detail-title">'+esc(r.title)+'</h2>'+
      (r.description ? '<p class="detail-desc">'+esc(r.description)+'</p>' : '')+
      '<div class="detail-meta">'+ metaBits.map(function(m){ return '<span>'+esc(m)+'</span>'; }).join('') +'</div>'+
      (reel ? '<a class="reel-link" href="'+reel+'" target="_blank" rel="noopener">Watch the original reel '+ICON_EXT+'</a>' : '')+
      '<div class="detail-cols">'+
        '<div><h4>Ingredients</h4><ul class="ing-list">'+ingHtml+'</ul></div>'+
        '<div><h4>Steps</h4><ol class="step-list">'+stepHtml+'</ol></div>'+
      '</div>'
    );

    openOverlay('detailOverlay');
    document.getElementById('detailBackBtn').addEventListener('click', function(){ closeOverlay('detailOverlay'); });
    document.getElementById('detailCloseBtn').addEventListener('click', function(){ closeOverlay('detailOverlay'); });
  }

  document.getElementById('searchInput').addEventListener('input', function(e){
    state.search = e.target.value;
    renderGrid();
  });

  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeOverlay('detailOverlay'); });

  renderTabs();
  renderGrid();

})();
</script>
</body>
</html>
